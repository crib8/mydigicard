<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engr. Christian | Engineering Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        /* Scroll Snap for Swipe Feel */
        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        section {
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        .engineering-bg {
            background: 
                linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'),
                url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80&w=2000');
            background-attachment: fixed;
            background-size: auto, auto, cover;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Glass Card Utility */
        .readable-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        /* Scroll Indicator Animation */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
        }

        .mouse {
            width: 24px;
            height: 40px;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            position: relative;
        }

        .wheel {
            width: 4px;
            height: 8px;
            background: #3b82f6;
            border-radius: 2px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            animation: scroll-wheel 1.5s infinite;
        }

        @keyframes scroll-wheel {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 15px); opacity: 0; }
        }

        .btn-action {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="engineering-bg">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-xs tracking-widest text-blue-500 uppercase">Loading ...</p>
    </div>

    <section class="min-h-screen relative flex flex-col justify-center items-center px-4">
        <div class="w-full max-w-lg">
            <div class="relative h-48 rounded-3xl overflow-hidden mb-[-4rem]" data-aos="fade-down">
                <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&q=80" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 to-transparent"></div>
            </div>

            <div class="readable-card p-6 pt-20 text-center relative z-10" data-aos="fade-up">
                <div class="absolute -top-16 left-1/2 -translate-x-1/2">
                    <div class="w-32 h-32 rounded-full border-4 border-blue-600 overflow-hidden shadow-2xl">
                        <img src="Khris.png?auto=format&fit=crop&q=80" class="w-full h-full object-cover">
                    </div>
                </div>

                <h1 class="text-3xl font-bold uppercase tracking-tight mb-1" style="font-family: 'Syncopate'">Khriss Halili</h1>
                <p class="text-blue-400 font-medium text-sm mb-6">Contractor</p>

                <div class="flex justify-center gap-4 mb-8">
                    <a href="https://wa.me/639158026678" title="WhatsApp" class="w-10 h-10 flex items-center justify-center rounded-full btn-action"><i class="fab fa-whatsapp"></i></a>
                    <a href="viber://chat?number=%2B639158026678" title="Viber" class="w-10 h-10 flex items-center justify-center rounded-full btn-action"><i class="fab fa-viber"></i></a>
                    <a href="#" title="WeChat" class="w-10 h-10 flex items-center justify-center rounded-full btn-action"><i class="fab fa-weixin"></i></a>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <a href="tel:+639158026678" class="flex items-center justify-center gap-2 py-3 px-4 bg-blue-600 rounded-xl font-semibold text-sm">
                        <i class="fas fa-phone-alt"></i> Call Me
                    </a>
                    <button onclick="downloadVCF()"  class="flex items-center justify-center gap-2 py-3 px-4 btn-action rounded-xl font-semibold text-sm">
                        <i class="fas fa-id-card"></i> Save Contact
                    </button>
                </div>
            </div>
        </div>

    </section>

   

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false, mirror: true });
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1000);
        });
         // Function to Download VCF
        function downloadVCF() {
            const vcfData = `BEGIN:VCARD
VERSION:3.0
FN:Khrissanto Halili
ORG:Halili Contracting
TITLE:Contractor
TEL;TYPE=CELL:+639158026678
ADR;TYPE=WORK:;;Las Piñas;Philippines;;;
END:VCARD`;

            const blob = new Blob([vcfData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Khrissanto_Halili.vcf';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
    
</body>
</html>
