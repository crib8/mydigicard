<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            overflow-x: hidden;
        }

        section {
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        .engineering-bg-light {
            background-color: #ffffff;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .readable-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 2rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        .btn-action {
            background: rgba(241, 245, 249, 1);
            border: 1px solid rgba(203, 213, 225, 1);
            color: #475569;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .mouse {
            width: 20px;
            height: 35px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            position: relative;
        }

        .wheel {
            width: 3px;
            height: 6px;
            background: #3b82f6;
            border-radius: 2px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            animation: scroll-wheel 1.5s infinite;
        }

        @keyframes scroll-wheel {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 12px); opacity: 0; }
        }
    </style>
</head>
<body class="engineering-bg-light">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-500 rounded-full animate-spin"></div>

                    <a href="viber://chat?number=%2B639158026678" class="w-12 h-12 flex items-center justify-center rounded-2xl btn-action text-xl"><i class="fab fa-viber"></i></a>
                    <a href="#" class="w-12 h-12 flex items-center justify-center rounded-2xl btn-action text-xl"><i class="fab fa-weixin"></i></a>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-2">
                    <a href="tel:+639158026678" class="flex items-center justify-center gap-2 py-4 px-4 bg-slate-900 text-white rounded-2xl font-bold text-sm shadow-lg hover:bg-blue-600 transition-colors">

            </div>
        </div>

        <div class="scroll-indicator">
            <span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Swipe Up</span>
            <div class="mouse"><div class="wheel"></div></div>

    </section>

            <div data-aos="fade-right">

                <p class="text-slate-500 leading-relaxed mb-6">Specializing in high-end structural works and unique architectural builds with precision and integrity.</p>
                <div class="inline-flex items-center gap-2 text-blue-600 font-bold text-xs uppercase tracking-widest">
                    <span class="w-8 h-[2px] bg-blue-600"></span> Philippine Based
                </div>
            </div>
            <div class="readable-card p-3 shadow-2xl shadow-blue-900/5" data-aos="zoom-in">
                <img src="https://images.unsplash.com/photo-1512428559087-560fa5ceab42?auto=format&fit=crop&q=80" class="rounded-2xl w-full h-80 object-cover shadow-inner">
            </div>
        </div>
    </section>

    <section class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full text-center" data-aos="zoom-in">
            <div class="readable-card p-10">
                <h3 class="text-xl font-bold text-slate-800 mb-6 uppercase tracking-widest" style="font-family: 'Syncopate'">Get a Quote</h3>
                <a href="sms:+639158026678?body=Hi Engr. Khrissanto, I would like to inquire about a project." class="block w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-200 hover:scale-[1.02] transition-transform uppercase">

            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false, mirror: true });

        // Loader
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        });

        // Function to Download VCF
        function downloadVCF() {
            const vcfData = `BEGIN:VCARD
VERSION:3.0
FN:Khrissanto Halili
ORG:Halili Contracting
TITLE:Contractor
TEL;TYPE=CELL:+639158026678
ADR;TYPE=WORK:;;Las Piñas;Philippines;;;
END:VCARD`;

            const blob = new Blob([vcfData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Khrissanto_Halili.vcf';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
